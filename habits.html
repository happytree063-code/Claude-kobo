<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="習慣追蹤">
  <title>每日習慣</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #f2f2f7;
      --card: #ffffff;
      --text-primary: #1c1c1e;
      --text-secondary: #8e8e93;
      --text-tertiary: #c7c7cc;
      --accent: #5e6ad2;
      --accent-light: #eef0fb;
      --green: #34c759;
      --red: #ff3b30;
      --orange: #ff9500;
      --border: #e5e5ea;
      --tab-height: 76px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      max-width: 430px;
      margin: 0 auto;
      overflow-x: hidden;
    }

    .content {
      padding: 0 16px calc(var(--tab-height) + 24px);
      padding-top: max(env(safe-area-inset-top, 0px), 56px);
    }

    /* ── Header ── */
    .page-header {
      padding: 12px 0 8px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 4px;
    }
    .page-title { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
    .page-date { font-size: 13px; color: var(--text-secondary); font-weight: 500; }

    /* ── Progress ring ── */
    .progress-card {
      background: var(--card);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .ring-wrap { position: relative; width: 72px; height: 72px; flex-shrink: 0; }
    .ring-wrap svg { transform: rotate(-90deg); }
    .ring-bg { fill: none; stroke: var(--border); stroke-width: 6; }
    .ring-fg { fill: none; stroke: var(--accent); stroke-width: 6; stroke-linecap: round;
               transition: stroke-dashoffset 0.6s cubic-bezier(0.34,1.56,0.64,1); }
    .ring-center {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    .ring-pct { font-size: 17px; font-weight: 800; }
    .progress-info { flex: 1; }
    .progress-label { font-size: 17px; font-weight: 700; margin-bottom: 3px; }
    .progress-sub { font-size: 13px; color: var(--text-secondary); }
    .motivate { font-size: 22px; margin-bottom: 2px; }

    /* ── Habit list ── */
    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 16px 0 8px 4px;
    }

    .habit-list { display: flex; flex-direction: column; gap: 8px; }

    .habit-item {
      background: var(--card);
      border-radius: 16px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      transition: opacity 0.1s;
      cursor: pointer;
      user-select: none;
    }
    .habit-item:active { opacity: 0.7; transform: scale(0.98); }
    .habit-item.done { background: #f9f9f9; }

    .habit-check {
      width: 28px; height: 28px;
      border-radius: 14px;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
      font-size: 14px;
    }
    .habit-item.done .habit-check {
      border-color: transparent;
      color: white;
    }

    .habit-emoji { font-size: 22px; line-height: 1; flex-shrink: 0; }
    .habit-emoji.done-emoji { opacity: 0.45; }

    .habit-info { flex: 1; min-width: 0; }
    .habit-name { font-size: 16px; font-weight: 600; }
    .habit-item.done .habit-name { color: var(--text-secondary); text-decoration: line-through; }
    .habit-streak { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .streak-fire { font-size: 11px; }

    .habit-time {
      font-size: 11px;
      color: var(--text-tertiary);
      font-weight: 500;
      flex-shrink: 0;
    }

    .empty-state {
      text-align: center;
      padding: 48px 0 24px;
      color: var(--text-secondary);
    }
    .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; margin-bottom: 4px; font-weight: 500; }
    .empty-state small { font-size: 13px; color: var(--text-tertiary); }

    /* ── Stats tab ── */
    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    .stat-card {
      background: var(--card);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .stat-card.full { grid-column: 1 / -1; }
    .stat-emoji { font-size: 24px; margin-bottom: 6px; }
    .stat-value { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
    .stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 2px; font-weight: 500; }

    /* weekly heatmap */
    .heatmap-wrap { overflow-x: auto; }
    .heatmap {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-bottom: 4px;
    }
    .heatmap-row { display: flex; gap: 5px; align-items: center; }
    .heatmap-label { font-size: 11px; color: var(--text-secondary); width: 60px; flex-shrink: 0; font-weight: 500; }
    .heatmap-cells { display: flex; gap: 5px; }
    .heatmap-day {
      width: 26px; height: 26px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 700;
    }
    .heatmap-day-label {
      width: 26px; height: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: var(--text-tertiary); font-weight: 600;
    }

    /* habit stat rows */
    .habit-stat-card {
      background: var(--card);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      margin-bottom: 12px;
    }
    .habit-stat-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .habit-stat-row:last-child { border-bottom: none; }
    .habit-stat-emoji { font-size: 20px; flex-shrink: 0; }
    .habit-stat-info { flex: 1; min-width: 0; }
    .habit-stat-name { font-size: 15px; font-weight: 600; }
    .habit-stat-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .habit-stat-right { text-align: right; flex-shrink: 0; }
    .habit-stat-streak { font-size: 17px; font-weight: 800; }
    .habit-stat-slabel { font-size: 10px; color: var(--text-secondary); }

    /* ── Manage tab ── */
    .manage-list {
      background: var(--card);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      margin-bottom: 12px;
    }
    .manage-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }
    .manage-row:last-child { border-bottom: none; }
    .manage-row:active { background: var(--bg); }
    .manage-emoji { font-size: 22px; }
    .manage-info { flex: 1; }
    .manage-name { font-size: 16px; font-weight: 600; }
    .manage-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .manage-arrow { color: var(--text-tertiary); font-size: 18px; }

    .add-habit-btn {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: none;
      background: var(--accent);
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.1s;
      box-shadow: 0 4px 14px rgba(94,106,210,0.35);
    }
    .add-habit-btn:active { opacity: 0.8; }

    /* ── Tab bar ── */
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(0,0,0,0.08);
      padding: 8px 0 calc(8px + env(safe-area-inset-bottom, 0px));
      display: flex;
      justify-content: space-around;
      z-index: 100;
    }
    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 28px;
      color: var(--text-tertiary);
      transition: color 0.15s;
      font-family: inherit;
    }
    .tab-item.active { color: var(--accent); }
    .tab-icon { font-size: 22px; line-height: 1; }
    .tab-label { font-size: 10px; font-weight: 600; }

    .view { display: none; }
    .view.active { display: block; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      width: 100%;
      max-width: 430px;
      background: var(--card);
      border-radius: 24px 24px 0 0;
      padding: 20px 20px calc(24px + env(safe-area-inset-bottom, 0px));
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.32,0.72,0,1);
      max-height: 92vh;
      overflow-y: auto;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-handle {
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 20px;
    }
    .modal-title { font-size: 20px; font-weight: 800; margin-bottom: 20px; }

    .form-group { margin-bottom: 16px; }
    .form-label {
      font-size: 11px; font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .form-input {
      width: 100%;
      padding: 13px 14px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 16px;
      font-family: inherit;
      background: var(--bg);
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-input.error { border-color: var(--red); }

    .emoji-picker {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .emoji-option {
      width: 42px; height: 42px;
      border-radius: 12px;
      border: 2px solid var(--border);
      background: var(--bg);
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .emoji-option.selected {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .color-picker { display: flex; gap: 10px; flex-wrap: wrap; }
    .color-option {
      width: 32px; height: 32px;
      border-radius: 16px;
      border: 3px solid transparent;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .color-option.selected { border-color: var(--text-primary); transform: scale(1.15); }

    .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      padding: 7px 16px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      font-size: 13px; font-weight: 600;
      cursor: pointer; background: transparent;
      color: var(--text-secondary);
      font-family: inherit;
      transition: all 0.15s;
    }
    .chip.selected { background: var(--text-primary); border-color: var(--text-primary); color: white; }

    .btn-row { display: flex; gap: 10px; margin-top: 20px; }
    .btn {
      flex: 1; padding: 15px;
      border-radius: 14px; border: none;
      font-size: 16px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      transition: opacity 0.1s;
    }
    .btn:active { opacity: 0.75; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-secondary { background: var(--bg); color: var(--text-primary); }
    .btn-danger { background: #fff0f0; color: var(--red); }

    /* ── Animations ── */
    @keyframes checkPop {
      0% { transform: scale(1); }
      40% { transform: scale(1.25); }
      100% { transform: scale(1); }
    }
    .pop { animation: checkPop 0.3s cubic-bezier(0.34,1.56,0.64,1); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.3s ease forwards; }

    .confetti-particle {
      position: fixed;
      width: 8px; height: 8px;
      border-radius: 2px;
      pointer-events: none;
      z-index: 9999;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0%   { opacity: 1; transform: translateY(0) rotate(0deg); }
      100% { opacity: 0; transform: translateY(200px) rotate(720deg); }
    }
  </style>
</head>
<body>

<!-- ── TODAY TAB ── -->
<div id="view-today" class="view active content">
  <div class="page-header">
    <div>
      <div class="page-title">每日習慣</div>
      <div class="page-date" id="today-date"></div>
    </div>
  </div>

  <div class="progress-card fade-up">
    <div class="ring-wrap">
      <svg width="72" height="72" viewBox="0 0 72 72">
        <circle class="ring-bg" cx="36" cy="36" r="30"/>
        <circle class="ring-fg" id="ring-progress" cx="36" cy="36" r="30"
                stroke-dasharray="188.5" stroke-dashoffset="188.5"/>
      </svg>
      <div class="ring-center">
        <div class="ring-pct" id="ring-pct">0%</div>
      </div>
    </div>
    <div class="progress-info">
      <div class="motivate" id="motivate-emoji">🌱</div>
      <div class="progress-label" id="progress-label">開始你的一天</div>
      <div class="progress-sub" id="progress-sub">還沒有完成任何習慣</div>
    </div>
  </div>

  <div class="section-title" id="pending-title"></div>
  <div class="habit-list" id="habit-list-pending"></div>

  <div class="section-title" id="done-title" style="display:none"></div>
  <div class="habit-list" id="habit-list-done"></div>

  <div id="empty-today" style="display:none">
    <div class="empty-state">
      <div class="emoji">✨</div>
      <p>還沒有習慣</p>
      <small>前往「習慣」頁面新增你的第一個習慣</small>
    </div>
  </div>
</div>

<!-- ── STATS TAB ── -->
<div id="view-stats" class="view content">
  <div class="page-header">
    <div class="page-title">統計</div>
  </div>

  <div class="stat-grid">
    <div class="stat-card">
      <div class="stat-emoji">🔥</div>
      <div class="stat-value" id="stat-best-streak">0</div>
      <div class="stat-label">最長連續天數</div>
    </div>
    <div class="stat-card">
      <div class="stat-emoji">✅</div>
      <div class="stat-value" id="stat-today-done">0</div>
      <div class="stat-label">今日完成</div>
    </div>
    <div class="stat-card">
      <div class="stat-emoji">📅</div>
      <div class="stat-value" id="stat-total-days">0</div>
      <div class="stat-label">追蹤天數</div>
    </div>
    <div class="stat-card">
      <div class="stat-emoji">⚡</div>
      <div class="stat-value" id="stat-rate">0%</div>
      <div class="stat-label">過去7天完成率</div>
    </div>
  </div>

  <div class="stat-card full" style="margin-bottom:12px">
    <div style="font-size:15px;font-weight:700;margin-bottom:16px">過去28天記錄</div>
    <div class="heatmap-wrap">
      <div class="heatmap" id="heatmap-container"></div>
    </div>
  </div>

  <div class="section-title">各習慣連續天數</div>
  <div class="habit-stat-card" id="habit-stats-list"></div>
</div>

<!-- ── MANAGE TAB ── -->
<div id="view-manage" class="view content">
  <div class="page-header">
    <div class="page-title">習慣</div>
  </div>
  <div class="manage-list" id="manage-list"></div>
  <div id="empty-manage" style="display:none">
    <div class="empty-state" style="padding-top: 24px;">
      <div class="emoji">🎯</div>
      <p>新增你的第一個習慣</p>
      <small>每天堅持小習慣，改變從這裡開始</small>
    </div>
  </div>
  <button class="add-habit-btn" onclick="openAddModal()" style="margin-top:12px">+ 新增習慣</button>
</div>

<!-- ── Tab bar ── -->
<div class="tab-bar">
  <button class="tab-item active" id="tab-today" onclick="switchTab('today')">
    <span class="tab-icon">☀️</span>
    <span class="tab-label">今日</span>
  </button>
  <button class="tab-item" id="tab-stats" onclick="switchTab('stats')">
    <span class="tab-icon">📊</span>
    <span class="tab-label">統計</span>
  </button>
  <button class="tab-item" id="tab-manage" onclick="switchTab('manage')">
    <span class="tab-icon">🎯</span>
    <span class="tab-label">習慣</span>
  </button>
</div>

<!-- ── Add/Edit Modal ── -->
<div class="modal-overlay" id="habit-modal" onclick="closeModalOnBg(event,'habit-modal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">新增習慣</div>

    <div class="form-group">
      <div class="form-label">習慣名稱</div>
      <input class="form-input" id="habit-name-input" type="text" placeholder="例：每天喝水 2L" maxlength="30"/>
    </div>

    <div class="form-group">
      <div class="form-label">圖示</div>
      <div class="emoji-picker" id="emoji-picker"></div>
    </div>

    <div class="form-group">
      <div class="form-label">顏色</div>
      <div class="color-picker" id="color-picker"></div>
    </div>

    <div class="form-group">
      <div class="form-label">時段</div>
      <div class="chip-row" id="time-chips">
        <button class="chip selected" onclick="selectTime('morning')">🌅 早晨</button>
        <button class="chip" onclick="selectTime('afternoon')">☀️ 下午</button>
        <button class="chip" onclick="selectTime('evening')">🌙 晚上</button>
        <button class="chip" onclick="selectTime('anytime')">🕐 隨時</button>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal('habit-modal')">取消</button>
      <button class="btn btn-primary" onclick="saveHabit()">儲存</button>
    </div>
    <div class="btn-row" id="delete-btn-row" style="display:none; margin-top:4px">
      <button class="btn btn-danger" onclick="deleteHabit()">刪除此習慣</button>
    </div>
  </div>
</div>

<script>
const EMOJIS = ['💧','🏃','📚','🧘','🥗','💪','😴','✍️','🎯','🎸','🧹','💊','🫁','🌿','☕','🧘‍♀️','🚴','🛁','🥦','🧠','🎨','💰','🙏','🌞'];
const COLORS = ['#5e6ad2','#34c759','#ff9500','#ff3b30','#af52de','#00c7be','#ff6b6b','#4ecdc4','#45b7d1','#f7b731'];
const TIME_LABELS = { morning:'早晨', afternoon:'下午', evening:'晚上', anytime:'隨時' };
const TIME_ICONS  = { morning:'🌅', afternoon:'☀️', evening:'🌙', anytime:'🕐' };

let data;
let editingId = null;
let selectedEmoji = EMOJIS[0];
let selectedColor = COLORS[0];
let selectedTime  = 'morning';

function uid() { return Math.random().toString(36).slice(2, 9); }

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function daysAgo(n) {
  const d = new Date();
  d.setDate(d.getDate() - n);
  return dateKey(d);
}

function isChecked(habitId, dk = todayKey()) {
  return !!(data.records[dk] && data.records[dk][habitId]);
}

function setChecked(habitId, val) {
  const dk = todayKey();
  if (!data.records[dk]) data.records[dk] = {};
  if (val) data.records[dk][habitId] = true;
  else delete data.records[dk][habitId];
  save();
}

function getStreak(habitId) {
  let streak = 0;
  const today = todayKey();
  let startOffset = isChecked(habitId) ? 0 : 1;
  for (let i = startOffset; i < 365; i++) {
    const dk = daysAgo(i);
    if (dk === today && startOffset === 0 && !isChecked(habitId)) break;
    if (data.records[dk] && data.records[dk][habitId]) streak++;
    else if (i >= startOffset) break;
  }
  return streak;
}

function getBestStreak(habitId) {
  let best = 0, cur = 0;
  for (let i = 364; i >= 0; i--) {
    const dk = daysAgo(i);
    if (data.records[dk] && data.records[dk][habitId]) cur++;
    else { best = Math.max(best, cur); cur = 0; }
  }
  return Math.max(best, cur);
}

function completionRate(days = 7) {
  if (!data.habits.length) return 0;
  let total = 0, done = 0;
  for (let i = 0; i < days; i++) {
    const dk = daysAgo(i);
    data.habits.forEach(h => {
      total++;
      if (data.records[dk] && data.records[dk][h.id]) done++;
    });
  }
  return total > 0 ? Math.round(done / total * 100) : 0;
}

function totalTrackedDays() {
  return Object.keys(data.records).length;
}

function save() {
  localStorage.setItem('habitData_v1', JSON.stringify(data));
}

function load() {
  try {
    const s = localStorage.getItem('habitData_v1');
    if (s) { data = JSON.parse(s); return; }
  } catch(e) {}
  data = {
    habits: [
      { id: uid(), name: '喝水 2L', emoji: '💧', color: '#5e6ad2', time: 'morning' },
      { id: uid(), name: '閱讀 30 分鐘', emoji: '📚', color: '#34c759', time: 'evening' },
      { id: uid(), name: '運動', emoji: '🏃', color: '#ff9500', time: 'morning' }
    ],
    records: {}
  };
}

function renderToday() {
  const d = new Date();
  const weekDays = ['日','一','二','三','四','五','六'];
  document.getElementById('today-date').textContent =
    `${d.getMonth()+1}月${d.getDate()}日 星期${weekDays[d.getDay()]}`;

  const habits = data.habits;
  const done = habits.filter(h => isChecked(h.id));
  const pending = habits.filter(h => !isChecked(h.id));
  const total = habits.length;
  const doneCount = done.length;
  const pct = total > 0 ? Math.round(doneCount / total * 100) : 0;

  const circumference = 188.5;
  const offset = circumference * (1 - pct / 100);
  const ring = document.getElementById('ring-progress');
  ring.style.strokeDashoffset = offset;
  ring.style.stroke = pct === 100 ? '#34c759' : '#5e6ad2';
  document.getElementById('ring-pct').textContent = pct + '%';

  let emoji, label, sub;
  if (total === 0) {
    emoji = '🌱'; label = '開始你的一天'; sub = '前往習慣頁面新增習慣';
  } else if (pct === 0) {
    emoji = '☀️'; label = '加油！'; sub = `今天還有 ${total} 個習慣等你`;
  } else if (pct < 50) {
    emoji = '💪'; label = '繼續！'; sub = `完成了 ${doneCount}/${total} 個`;
  } else if (pct < 100) {
    emoji = '🔥'; label = '快完成了！'; sub = `還剩 ${pending.length} 個習慣`;
  } else {
    emoji = '🎉'; label = '今日全部完成！'; sub = '太棒了，明天繼續保持！';
  }
  document.getElementById('motivate-emoji').textContent = emoji;
  document.getElementById('progress-label').textContent = label;
  document.getElementById('progress-sub').textContent = sub;

  document.getElementById('empty-today').style.display = total === 0 ? 'block' : 'none';

  const pendingTitle = document.getElementById('pending-title');
  const doneTitle = document.getElementById('done-title');
  pendingTitle.textContent = pending.length > 0 ? `待完成 (${pending.length})` : '';
  doneTitle.style.display = done.length > 0 ? 'block' : 'none';
  doneTitle.textContent = `已完成 (${done.length})`;

  renderHabitList('habit-list-pending', pending);
  renderHabitList('habit-list-done', done);
}

function renderHabitList(containerId, habits) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  habits.forEach(h => {
    const checked = isChecked(h.id);
    const streak = getStreak(h.id);
    const div = document.createElement('div');
    div.className = 'habit-item' + (checked ? ' done' : '') + ' fade-up';
    div.onclick = () => toggleHabit(h.id);
    div.innerHTML = `
      <div class="habit-check" style="${checked ? `background:${h.color};border-color:${h.color}` : `border-color:${h.color}`}">
        ${checked ? '✓' : ''}
      </div>
      <span class="habit-emoji${checked ? ' done-emoji' : ''}">${h.emoji}</span>
      <div class="habit-info">
        <div class="habit-name">${h.name}</div>
        <div class="habit-streak">
          ${streak > 0 ? `🔥 ${streak} 天連續` : TIME_ICONS[h.time] + ' ' + TIME_LABELS[h.time]}
        </div>
      </div>
      <div class="habit-time">${TIME_ICONS[h.time]}</div>
    `;
    el.appendChild(div);
  });
}

function toggleHabit(id) {
  const newVal = !isChecked(id);
  setChecked(id, newVal);
  if (newVal) {
    const allDone = data.habits.every(h => isChecked(h.id));
    if (allDone && data.habits.length > 0) launchConfetti();
  }
  renderToday();
}

function renderStats() {
  let bestStreak = 0;
  data.habits.forEach(h => { bestStreak = Math.max(bestStreak, getBestStreak(h.id)); });
  const todayDone = data.habits.filter(h => isChecked(h.id)).length;

  document.getElementById('stat-best-streak').textContent = bestStreak;
  document.getElementById('stat-today-done').textContent = `${todayDone}/${data.habits.length}`;
  document.getElementById('stat-total-days').textContent = totalTrackedDays();
  document.getElementById('stat-rate').textContent = completionRate(7) + '%';

  const heatmap = document.getElementById('heatmap-container');
  heatmap.innerHTML = '';

  const headerRow = document.createElement('div');
  headerRow.className = 'heatmap-row';
  headerRow.innerHTML = '<div class="heatmap-label"></div><div class="heatmap-cells">' +
    ['日','一','二','三','四','五','六'].map(d =>
      `<div class="heatmap-day-label">${d}</div>`
    ).join('') + '</div>';
  heatmap.appendChild(headerRow);

  for (let week = 3; week >= 0; week--) {
    const row = document.createElement('div');
    row.className = 'heatmap-row';
    const endDay = week * 7;
    const weekLabel = week === 0 ? '本週' : `${week}週前`;
    let cells = `<div class="heatmap-label">${weekLabel}</div><div class="heatmap-cells">`;

    for (let dayOfWeek = 6; dayOfWeek >= 0; dayOfWeek--) {
      const daysBack = endDay + dayOfWeek;
      const dk = daysAgo(daysBack);
      const total = data.habits.length;
      let done = 0;
      if (data.records[dk]) {
        data.habits.forEach(h => { if (data.records[dk][h.id]) done++; });
      }
      const ratio = total > 0 ? done / total : 0;
      let bg, textColor;
      if (total === 0 || (done === 0 && !data.records[dk])) {
        bg = '#f2f2f7'; textColor = 'transparent';
      } else if (ratio === 0) {
        bg = '#e5e5ea'; textColor = 'var(--text-tertiary)';
      } else if (ratio < 0.5) {
        bg = '#c7d9ff'; textColor = '#5e6ad2';
      } else if (ratio < 1) {
        bg = '#7ba4f5'; textColor = 'white';
      } else {
        bg = '#5e6ad2'; textColor = 'white';
      }
      const label = done > 0 ? done : '';
      cells += `<div class="heatmap-day" style="background:${bg};color:${textColor}">${label}</div>`;
    }
    cells += '</div>';
    row.innerHTML = cells;
    heatmap.appendChild(row);
  }

  const list = document.getElementById('habit-stats-list');
  if (!data.habits.length) {
    list.innerHTML = '<div class="habit-stat-row"><span style="color:var(--text-secondary);font-size:14px;padding:4px 0">尚無習慣</span></div>';
    return;
  }
  list.innerHTML = data.habits.map(h => {
    const streak = getStreak(h.id);
    const best = getBestStreak(h.id);
    const rate7 = (() => {
      let done = 0;
      for (let i = 0; i < 7; i++) {
        const dk = daysAgo(i);
        if (data.records[dk] && data.records[dk][h.id]) done++;
      }
      return Math.round(done / 7 * 100);
    })();
    return `<div class="habit-stat-row">
      <div class="habit-stat-emoji">${h.emoji}</div>
      <div class="habit-stat-info">
        <div class="habit-stat-name">${h.name}</div>
        <div class="habit-stat-sub">7天完成率 ${rate7}% · 最長 ${best} 天</div>
      </div>
      <div class="habit-stat-right">
        <div class="habit-stat-streak" style="color:${h.color}">${streak}</div>
        <div class="habit-stat-slabel">連續天</div>
      </div>
    </div>`;
  }).join('');
}

function renderManage() {
  const list = document.getElementById('manage-list');
  const empty = document.getElementById('empty-manage');
  if (!data.habits.length) {
    list.style.display = 'none';
    empty.style.display = 'block';
    return;
  }
  list.style.display = 'block';
  empty.style.display = 'none';
  list.innerHTML = data.habits.map(h => {
    const streak = getStreak(h.id);
    return `<div class="manage-row" onclick="openEditModal('${h.id}')">
      <div class="manage-emoji">${h.emoji}</div>
      <div class="manage-info">
        <div class="manage-name">${h.name}</div>
        <div class="manage-sub" style="color:${h.color}">${streak > 0 ? `🔥 連續 ${streak} 天` : TIME_ICONS[h.time] + ' ' + TIME_LABELS[h.time]}</div>
      </div>
      <div class="manage-arrow">›</div>
    </div>`;
  }).join('');
}

function switchTab(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'today') renderToday();
  else if (name === 'stats') renderStats();
  else if (name === 'manage') renderManage();
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function closeModalOnBg(e, id) { if (e.target.id === id) closeModal(id); }

function buildModalPickers() {
  const ep = document.getElementById('emoji-picker');
  ep.innerHTML = EMOJIS.map(e =>
    `<button class="emoji-option${e === selectedEmoji ? ' selected' : ''}"
             onclick="pickEmoji('${e}')">${e}</button>`
  ).join('');
  const cp = document.getElementById('color-picker');
  cp.innerHTML = COLORS.map(c =>
    `<div class="color-option${c === selectedColor ? ' selected' : ''}"
          style="background:${c}"
          onclick="pickColor('${c}')"></div>`
  ).join('');
  document.querySelectorAll('#time-chips .chip').forEach(chip => {
    const t = chip.getAttribute('onclick').match(/'(\w+)'/)[1];
    chip.className = 'chip' + (t === selectedTime ? ' selected' : '');
  });
}

function pickEmoji(e) {
  selectedEmoji = e;
  document.querySelectorAll('.emoji-option').forEach(el => {
    el.className = 'emoji-option' + (el.textContent === e ? ' selected' : '');
  });
}

function pickColor(c) {
  selectedColor = c;
  document.querySelectorAll('.color-option').forEach(el => {
    el.className = 'color-option' + (el.style.background === c ? ' selected' : '');
  });
}

function selectTime(t) {
  selectedTime = t;
  document.querySelectorAll('#time-chips .chip').forEach(chip => {
    const ct = chip.getAttribute('onclick').match(/'(\w+)'/)[1];
    chip.className = 'chip' + (ct === t ? ' selected' : '');
  });
}

function openAddModal() {
  editingId = null;
  selectedEmoji = EMOJIS[0];
  selectedColor = COLORS[0];
  selectedTime = 'morning';
  document.getElementById('modal-title').textContent = '新增習慣';
  document.getElementById('habit-name-input').value = '';
  document.getElementById('habit-name-input').classList.remove('error');
  document.getElementById('delete-btn-row').style.display = 'none';
  buildModalPickers();
  openModal('habit-modal');
  setTimeout(() => document.getElementById('habit-name-input').focus(), 350);
}

function openEditModal(id) {
  const h = data.habits.find(x => x.id === id);
  if (!h) return;
  editingId = id;
  selectedEmoji = h.emoji;
  selectedColor = h.color;
  selectedTime = h.time || 'anytime';
  document.getElementById('modal-title').textContent = '編輯習慣';
  document.getElementById('habit-name-input').value = h.name;
  document.getElementById('habit-name-input').classList.remove('error');
  document.getElementById('delete-btn-row').style.display = 'flex';
  buildModalPickers();
  openModal('habit-modal');
}

function saveHabit() {
  const name = document.getElementById('habit-name-input').value.trim();
  if (!name) {
    document.getElementById('habit-name-input').classList.add('error');
    document.getElementById('habit-name-input').focus();
    return;
  }
  document.getElementById('habit-name-input').classList.remove('error');

  if (editingId) {
    const idx = data.habits.findIndex(h => h.id === editingId);
    if (idx >= 0) {
      data.habits[idx] = { ...data.habits[idx], name, emoji: selectedEmoji, color: selectedColor, time: selectedTime };
    }
  } else {
    data.habits.push({ id: uid(), name, emoji: selectedEmoji, color: selectedColor, time: selectedTime });
  }
  save();
  closeModal('habit-modal');
  renderManage();
  renderToday();
}

function deleteHabit() {
  if (!editingId) return;
  data.habits = data.habits.filter(h => h.id !== editingId);
  Object.keys(data.records).forEach(dk => {
    if (data.records[dk]) delete data.records[dk][editingId];
  });
  save();
  closeModal('habit-modal');
  renderManage();
  renderToday();
}

function launchConfetti() {
  const colors = ['#5e6ad2','#34c759','#ff9500','#ff3b30','#af52de','#00c7be'];
  for (let i = 0; i < 40; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-particle';
    el.style.cssText = `
      left: ${Math.random() * 100}vw;
      top: ${20 + Math.random() * 30}vh;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      animation-duration: ${0.8 + Math.random() * 0.8}s;
      animation-delay: ${Math.random() * 0.3}s;
      transform: rotate(${Math.random() * 360}deg);
      width: ${6 + Math.random() * 6}px;
      height: ${6 + Math.random() * 6}px;
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2000);
  }
}

function checkDayReset() {
  const cutoff = daysAgo(90);
  Object.keys(data.records).forEach(dk => {
    if (dk < cutoff) delete data.records[dk];
  });
}

load();
checkDayReset();
renderToday();
</script>
</body>
</html>
